<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RideTune</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ===========================
         TELA INICIAL
    ============================ -->

    <div id="homeScreen">

        <img src="images/logo.png"
             alt="RideTune"
             class="logo">

        <p class="subtitle">

            Your ride. Your soundtrack.

        </p>

        <h3 id="languageTitle">
            Escolha seu idioma
        </h3>

        <div class="languages">

            <div class="language"
                 onclick="openMusic('pt')">

                🇧🇷<br>

                Português

            </div>

            <div class="language"
                 onclick="openMusic('en')">

                🇺🇸<br>

                English

            </div>

            <div class="language"
                 onclick="openMusic('es')">

                🇪🇸<br>

                Español

            </div>

            <div class="language"
                 onclick="openMusic('fr')">

                🇫🇷<br>

                Français

            </div>

            <div class="language"
                 onclick="openMusic('it')">

                🇮🇹<br>

                Italiano

            </div>

        </div>

    </div>





    <!-- ===========================
         TELA DE MÚSICAS
    ============================ -->

    <div
        class="music-screen"
        id="musicScreen">

        <button
            class="back-button"
            onclick="goBack()">

            ← Voltar

        </button>



        <h2 id="musicTitle">

            🎧 Escolha sua música

        </h2>



        <input

            id="musicSearch"

            class="search-box"

            type="text"

            placeholder="🔎 Buscar música"

            autocomplete="off"
          />
      <!-- ===========================
             TOP HITS
        ============================ -->

        <h3 id="topHitsTitle">

            ⭐ Músicas mais pedidas

        </h3>

        <div id="topHits">

            <!-- Os Top Hits serão carregados automaticamente pelo JavaScript -->

        </div>



        <!-- ===========================
             RESULTADOS DA PESQUISA
        ============================ -->

        <div id="searchResults">

            <!-- Os resultados aparecerão aqui -->

        </div>



        <!-- ===========================
             BOTÃO
        ============================ -->

        <button

            class="send-button"

            id="sendButton"

            onclick="sendMusic()"

            disabled>

            🚗 Enviar ao motorista

        </button>



    </div>

</div>

<script src="script.js"></script>

</body>

</html>
