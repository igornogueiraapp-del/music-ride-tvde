<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideTune</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- TELA INICIAL -->
    <div id="homeScreen">

        <img src="images/logo.png" alt="RideTune" class="logo">

        <h1>RideTune</h1>

        <p class="subtitle">
            Your ride. Your soundtrack.
        </p>

        <h3>Escolha seu idioma</h3>

        <div class="languages" id="languageScreen">

            <div class="language" onclick="openMusic()">
                🇧🇷<br>Português
            </div>

            <div class="language" onclick="openMusic()">
                🇺🇸<br>English
            </div>

            <div class="language" onclick="openMusic()">
                🇪🇸<br>Español
            </div>

            <div class="language" onclick="openMusic()">
                🇫🇷<br>Français
            </div>

            <div class="language" onclick="openMusic()">
                🇮🇹<br>Italiano
            </div>

        </div>

    </div>


    <!-- TELA DE MÚSICAS -->

    <div class="music-screen" id="musicScreen">

        <button class="back-button" onclick="goBack()">
            ← Voltar
        </button>

        <h2>🎧 Escolha sua música</h2>

        <div class="search-box">
            🔎 Buscar música
        </div>

        <h3>⭐ Músicas mais pedidas</h3>

        <div class="music-card" onclick="selectMusic(this)">

            <div class="check">✔</div>

            <div class="cover">🎵</div>

            <div class="music-info">
                <strong>Nome da música</strong>
                <p>Artista</p>
            </div>

        </div>

        <div class="music-card" onclick="selectMusic(this)">

            <div class="check">✔</div>

            <div class="cover">🎵</div>

            <div class="music-info">
                <strong>Nome da música</strong>
                <p>Artista</p>
            </div>

        </div>

        <div class="music-card" onclick="selectMusic(this)">

            <div class="check">✔</div>

            <div class="cover">🎵</div>

            <div class="music-info">
                <strong>Nome da música</strong>
                <p>Artista</p>
            </div>

        </div>

        <button class="send-button">
            🚗 Enviar ao motorista
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
